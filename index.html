<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdSense AI | Professional Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
        }
        body { background-color: var(--dark-bg); color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .navbar { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #334155; }
        .hero-section { padding: 60px 0; background: var(--primary-gradient); clip-path: ellipse(150% 100% at 50% 0%); margin-bottom: 50px; }
        .upload-card { background: var(--card-bg); border: 1px solid #334155; border-radius: 20px; padding: 40px; }
        .upload-area { border: 2px dashed #6366f1; border-radius: 15px; padding: 50px; cursor: pointer; background: rgba(99, 102, 241, 0.05); transition: all 0.3s ease; text-align: center; }
        .upload-area:hover { background: rgba(99, 102, 241, 0.1); border-color: #818cf8; }
        .nav-pills .nav-link { color: #94a3b8; border: 1px solid #334155; margin: 0 5px; }
        .nav-pills .nav-link.active { background: var(--primary-gradient); border: none; }
        .spinner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); display: none; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

    <div class="spinner-overlay" id="loadingSpinner">
        <div class="text-center">
            <div class="spinner-border text-light" role="status" style="width: 4rem; height: 4rem;"></div>
            <h4 class="mt-4">AI Processing...</h4>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">CrowdSense <span class="text-info">AI</span></a>
        </div>
    </nav>

    <div class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Crowd Analysis System</h1>
            <p class="opacity-75">Visualizing Density through Deep Learning</p>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="upload-card shadow-lg mb-5">
                    
                    {% if crowd_count %}
                    <div class="text-center mb-4 animate__animated animate__fadeIn">
                        <h2 class="fw-bold">Estimated Crowd Count: <span class="text-info">{{ crowd_count }}</span></h2>
                        <a href="/" class="btn btn-sm btn-outline-secondary">Clear and Upload Again</a>
                        <hr class="border-secondary">
                    </div>
                    {% endif %}

                    <ul class="nav nav-pills mb-4 justify-content-center" id="pills-tab" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" id="image-tab" data-bs-toggle="pill" data-bs-target="#pills-image" type="button">📸 Image</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="video-tab" data-bs-toggle="pill" data-bs-target="#pills-video" type="button">🎥 Video</button>
                        </li>
                    </ul>

                    <div class="tab-content" id="pills-tabContent">
                        <div class="tab-pane fade show active" id="pills-image">
                            <div class="upload-area" onclick="document.getElementById('imageInput').click();">
                                <h3>Upload Image</h3>
                                <p class="text-muted small">JPG, PNG, WEBP</p>
                                <form id="imageForm" action="/predict" method="post" enctype="multipart/form-data">
                                    <input type="file" name="file" id="imageInput" accept="image/*" style="display: none;" onchange="submitMedia('imageForm')">
                                </form>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="pills-video">
                            <div class="upload-area" style="border-color: #f43f5e;" onclick="document.getElementById('videoInput').click();">
                                <h3>Upload Video</h3>
                                <p class="text-muted small">MP4, AVI, MOV</p>
                                <form id="videoForm" action="/predict" method="post" enctype="multipart/form-data">
                                    <input type="file" name="file" id="videoInput" accept="video/*" style="display: none;" onchange="submitMedia('videoForm')">
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function submitMedia(formId) {
            const fileInput = document.getElementById(formId).querySelector('input[type="file"]');
            if(fileInput.files.length > 0) {
                document.getElementById('loadingSpinner').style.display = 'flex';
                document.getElementById(formId).submit();
            }
        }
    </script>
</body>
</html>
